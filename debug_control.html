<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — Remote Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: { 900: '#0B0F1A', 800: '#121829', 700: '#1A2138', 600: '#232B44' },
                        accent: { 400: '#7C5CFC', 500: '#6B47F5', 600: '#5A35E0' },
                        mint: { 400: '#34D399', 500: '#10B981' },
                        coral: { 400: '#FB7185', 500: '#F43F5E' },
                        gold: { 400: '#FBBF24', 500: '#F59E0B' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F1A; }
        .card { 
            background: rgba(26, 33, 56, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-trigger {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-trigger:active { transform: scale(0.95); }
        .btn-trigger:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="font-sans text-white min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 flex items-center justify-between">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl bg-accent-500 flex items-center justify-center text-xl shadow-lg shadow-accent-500/20">🎮</div>
                    <h1 class="text-2xl font-bold tracking-tight">Remote Control</h1>
                </div>
                <p class="text-white/40 text-sm">Trigger animations and badges on your iPhone</p>
            </div>
            <div id="auth-status" class="text-xs font-medium px-3 py-1 rounded-full bg-white/5 border border-white/10 text-white/40">
                Checking connection...
            </div>
        </header>

        <div id="login-warning" class="hidden mb-8 p-6 rounded-2xl bg-coral-500/10 border border-coral-500/20 text-coral-400 text-sm text-center">
            You are not logged in. <a href="/" class="underline font-bold">Click here to log in</a> first, then return to this page.
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- UI Actions Section -->
            <section class="card rounded-3xl p-8">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="text-accent-400">✨</span> UI Actions
                </h2>
                <div class="space-y-4">
                    <button onclick="trigger('celebration', null, 'Goal Reached!')" 
                            class="btn-trigger w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/5 text-left">
                        <div>
                            <div class="font-bold text-sm">Daily Celebration</div>
                            <div class="text-xs text-white/40">Full-screen confetti + message</div>
                        </div>
                        <span class="text-xl">🎊</span>
                    </button>
                    
                    <button onclick="trigger('award-xp', { xp_earned: 50, total: 1550, level: 2, daily: 180 }, 'XP Awarded!')" 
                            class="btn-trigger w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/5 text-left">
                        <div>
                            <div class="font-bold text-sm">XP Progress Sync</div>
                            <div class="text-xs text-white/40">Animate circle progress live</div>
                        </div>
                        <span class="text-xl">🎯</span>
                    </button>

                    <button onclick="markTodayDone()" class="btn-trigger w-full flex items-center justify-between p-4 rounded-2xl bg-mint-500/10 hover:bg-mint-500/20 border border-mint-500/20 text-left">
                        <div>
                            <div class="font-bold text-sm text-mint-400">Mark All Today Done</div>
                            <div class="text-xs text-mint-400/50">Update DB + Trigger Celebration</div>
                        </div>
                        <span class="text-xl">✅</span>
                    </button>

                    <button onclick="triggerMorningPrompt()" class="btn-trigger w-full flex items-center justify-between p-4 rounded-2xl bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/20 text-left">
                        <div>
                            <div class="font-bold text-sm text-sky-400">Trigger Morning Review</div>
                            <div class="text-xs text-sky-400/50">Show yesterday's unfinished tasks prompt</div>
                        </div>
                        <span class="text-xl">☕</span>
                    </button>

                    <div class="pt-4 border-t border-white/5">
                        <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-3">Streak Splashes (No Badge)</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="trigger('streak-splash', { streak: 2 }, '2-Day Streak!')" class="btn-trigger bg-white/5 py-3 rounded-xl hover:bg-white/10 text-xl border border-white/5">🐣</button>
                            <button onclick="trigger('streak-splash', { streak: 7 }, '7-Day Streak!')" class="btn-trigger bg-white/5 py-3 rounded-xl hover:bg-white/10 text-xl border border-white/5">🔥</button>
                            <button onclick="trigger('streak-splash', { streak: 14 }, '14-Day Streak!')" class="btn-trigger bg-white/5 py-3 rounded-xl hover:bg-white/10 text-xl border border-white/5">🏆</button>
                            <button onclick="trigger('streak-splash', { streak: 30 }, '30-Day Streak!')" class="btn-trigger bg-white/5 py-3 rounded-xl hover:bg-white/10 text-xl border border-white/5">💎</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Milestones & Badges Section -->
            <section class="card rounded-3xl p-8">
                <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <span class="text-gold-400">🏆</span> Milestones & Badges
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-3">Streak Badges</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="trigger('new-badge', { badge: 'iron_will_7' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">🔥🔥</div>
                                <div class="text-[9px] font-bold uppercase">7 Days</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'iron_will_10' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">⚡</div>
                                <div class="text-[9px] font-bold uppercase">10 Days</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'iron_will_14' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">🏆</div>
                                <div class="text-[9px] font-bold uppercase">14 Days</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'iron_will_30' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">💎</div>
                                <div class="text-[9px] font-bold uppercase">30 Days</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'iron_will_100' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">👑</div>
                                <div class="text-[9px] font-bold uppercase">100 Days</div>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-white/30 uppercase tracking-widest mb-3">Task Badges</label>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="trigger('new-badge', { badge: 'task_master_10' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">📖</div>
                                <div class="text-[9px] font-bold uppercase text-white/50">10 Tasks</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'task_master_20' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">📚</div>
                                <div class="text-[9px] font-bold uppercase text-white/50">20 Tasks</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'task_master_50' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">📜</div>
                                <div class="text-[9px] font-bold uppercase text-white/50">50 Tasks</div>
                            </button>
                            <button onclick="trigger('new-badge', { badge: 'task_master_100' }, 'Badge Awarded!')" 
                                    class="btn-trigger bg-white/5 p-3 rounded-xl hover:bg-white/10 border border-white/5 text-center">
                                <div class="text-xl mb-1">🏅</div>
                                <div class="text-[9px] font-bold uppercase text-white/50">100 Tasks</div>
                            </button>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/5 space-y-3">
                        <button onclick="awardXP()" class="w-full py-3 rounded-xl border border-mint-500/30 text-mint-400 text-xs font-bold hover:bg-mint-500/10 transition-colors btn-trigger">
                            Award 500 XP (Server + Sync)
                        </button>
                        <button onclick="resetProgress()" class="w-full py-3 rounded-xl bg-coral-500/10 border border-coral-500/20 text-coral-400 text-xs font-bold hover:bg-coral-500/20 transition-colors btn-trigger">
                            Reset All Progress (XP/Streak/Badges)
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <footer class="mt-12 pt-8 border-t border-white/5 text-center">
            <button onclick="location.href='/dashboard'" class="text-xs text-white/30 hover:text-white transition-colors">Return to Dashboard</button>
        </footer>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { getAPI, authFetch } from '/js/store.js?v=AUTO';

        window.trigger = async (action, data, title) => {
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/debug/trigger`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action,
                        title: title || "Debug Trigger",
                        body: "Animation triggered from Control Panel",
                        data
                    })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || res.statusText);
                }
                showStatus('Success: Triggered ' + action, 'mint');
            } catch (err) {
                console.error('Trigger failed:', err);
                alert('Trigger failed: ' + err.message);
            }
        };

        window.awardXP = async () => {
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/debug/award-xp-debug`, { method: 'POST' });
                if (!res.ok) throw new Error('Update failed');
                showStatus('Success: 500 XP Awarded & Synced', 'mint');
            } catch (err) {
                alert('Failed to award XP');
            }
        };

        window.markTodayDone = async () => {
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/debug/mark-today-done`, { method: 'POST' });
                if (!res.ok) throw new Error('Update failed');
                showStatus('Success: Today Complete & Celebration Triggered', 'mint');
            } catch (err) {
                alert('Failed to mark today done');
            }
        };

        window.triggerMorningPrompt = async () => {
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/debug/trigger-morning-prompt`, { method: 'POST' });
                if (!res.ok) throw new Error('Trigger failed');
                showStatus('Success: Morning Review Triggered', 'mint');
            } catch (err) {
                alert('Failed to trigger morning review');
            }
        };

        window.resetProgress = async () => {
            if (!confirm('Are you sure? This will delete all your XP, streaks, and badges!')) return;
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/debug/reset-progress`, { method: 'POST' });
                if (!res.ok) throw new Error('Reset failed');
                showStatus('Success: Progress Reset', 'mint');
                alert('All progress has been reset.');
            } catch (err) {
                alert('Failed to reset progress');
            }
        };

        function showStatus(msg, color) {
            const status = document.getElementById('auth-status');
            status.textContent = msg;
            status.className = `text-xs font-medium px-3 py-1 rounded-full bg-white/5 border border-white/10 text-${color}-400`;
        }

        async function checkAuth() {
            const api = getAPI();
            try {
                const res = await authFetch(`${api}/auth/me`);
                if (res.ok) {
                    const user = await res.json();
                    showStatus(`Connected: ${user.name}`, 'mint');
                } else {
                    showStatus('Not Logged In', 'coral');
                    document.getElementById('login-warning').classList.remove('hidden');
                    document.querySelectorAll('.btn-trigger').forEach(b => b.disabled = true);
                }
            } catch (err) {
                showStatus('Connection Error', 'coral');
            }
        }

        checkAuth();
    </script>
</body>
</html>
